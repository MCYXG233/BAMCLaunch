name: BAMCLauncher CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  # 代码质量检查
  code-quality:
    name: Code Quality Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Run Flutter analyze
        run: flutter analyze

      - name: Check code formatting
        run: dart format --set-exit-if-changed .

      - name: Check for unused imports
        run: |
          dart pub global activate remove_from_coverage
          dart pub global run remove_from_coverage:remove_from_coverage
        continue-on-error: true

  # 单元测试
  unit-tests:
    name: Unit Tests
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        flutter-version: ['3.22.x']
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ matrix.flutter-version }}
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Run unit tests
        run: flutter test test/core/ --coverage

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          file: coverage/lcov.info
          flags: unit-tests
          name: codecov-umbrella

  # 集成测试
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Run integration tests
        run: flutter test test/comprehensive_integration_test.dart

  # 跨平台构建测试
  build-test:
    name: Build Test
    runs-on: ${{ matrix.os }}
    needs: [code-quality, unit-tests, integration-tests]
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        flutter-version: ['3.22.x']
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ matrix.flutter-version }}
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Build web version
        run: flutter build web --release

      - name: Build Windows version
        if: matrix.os == 'windows-latest'
        run: flutter build windows --release

      - name: Build macOS version
        if: matrix.os == 'macos-latest'
        run: flutter build macos --release

      - name: Build Linux version
        if: matrix.os == 'ubuntu-latest'
        run: flutter build linux --release

  # 安全扫描
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: code-quality
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  # 性能测试
  performance-test:
    name: Performance Test
    runs-on: ubuntu-latest
    needs: build-test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Run stress tests
        run: flutter test test/stress_test.dart

  # Windows打包
  package-windows:
    name: Package Windows
    runs-on: windows-latest
    needs: [build-test, performance-test]
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release

      - name: Install WiX Toolset
        run: |
          choco install wixtoolset -y
          echo "C:\Program Files (x86)\WiX Toolset v3.11\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Activate flutter_distributor
        run: dart pub global activate flutter_distributor

      - name: Package Windows MSI
        env:
          WINDOWS_CERTIFICATE_FILE: ${{ secrets.WINDOWS_CERTIFICATE_FILE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          $env:PATH += ";C:\Users\runneradmin\AppData\Local\Pub\Cache\bin"
          flutter_distributor package --platform windows --targets msi

      - name: Package Windows ZIP
        run: |
          $env:PATH += ";C:\Users\runneradmin\AppData\Local\Pub\Cache\bin"
          flutter_distributor package --platform windows --targets zip

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-packages
          path: dist/windows/

  # macOS打包
  package-macos:
    name: Package macOS
    runs-on: macos-latest
    needs: [build-test, performance-test]
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Build macOS release
        run: flutter build macos --release

      - name: Activate flutter_distributor
        run: dart pub global activate flutter_distributor

      - name: Package macOS DMG
        env:
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          export PATH="$HOME/.pub-cache/bin:$PATH"
          flutter_distributor package --platform macos --targets dmg

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-packages
          path: dist/macos/

  # Linux打包
  package-linux:
    name: Package Linux
    runs-on: ubuntu-latest
    needs: [build-test, performance-test]
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            ninja-build \
            pkg-config \
            libgtk-3-dev \
            liblzma-dev \
            dpkg-dev \
            rpm \
            libarchive-tools

      - name: Install dependencies
        run: flutter pub get

      - name: Build Linux release
        run: flutter build linux --release

      - name: Activate flutter_distributor
        run: dart pub global activate flutter_distributor

      - name: Install AppImageKit
        run: |
          wget https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          sudo mv appimagetool-x86_64.AppImage /usr/local/bin/appimagetool

      - name: Package Linux deb
        run: |
          export PATH="$HOME/.pub-cache/bin:$PATH"
          flutter_distributor package --platform linux --targets deb

      - name: Package Linux rpm
        run: |
          export PATH="$HOME/.pub-cache/bin:$PATH"
          flutter_distributor package --platform linux --targets rpm

      - name: Package Linux AppImage
        run: |
          export PATH="$HOME/.pub-cache/bin:$PATH"
          flutter_distributor package --platform linux --targets appimage

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: dist/linux/

  # 创建GitHub Release
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [package-windows, package-macos, package-linux]
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Windows packages
        uses: actions/download-artifact@v4
        with:
          name: windows-packages
          path: ./dist/windows

      - name: Download macOS packages
        uses: actions/download-artifact@v4
        with:
          name: macos-packages
          path: ./dist/macos

      - name: Download Linux packages
        uses: actions/download-artifact@v4
        with:
          name: linux-packages
          path: ./dist/linux

      - name: Read CHANGELOG.md
        id: changelog
        run: |
          VERSION_TAG="${GITHUB_REF#refs/tags/v}"
          echo "VERSION_TAG=$VERSION_TAG" >> $GITHUB_OUTPUT
          
          # Extract changelog for this version
          if grep -q "## 版本 $VERSION_TAG" CHANGELOG.md; then
            CHANGELOG=$(sed -n "/## 版本 $VERSION_TAG/,/^## /p" CHANGELOG.md | head -n -1)
          else
            CHANGELOG="版本 $VERSION_TAG 的更新日志"
          fi
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          release_name: "BAMCLauncher v${{ steps.changelog.outputs.VERSION_TAG }}"
          body: |
            ${{ steps.changelog.outputs.CHANGELOG }}
            
            ## 下载链接
            
            ### Windows
            - [BAMCLauncher-Setup.msi](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/BAMCLauncher-Setup.msi)
            - [BAMCLauncher-Portable.zip](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/BAMCLauncher-Portable.zip)
            
            ### macOS
            - [BAMCLauncher.dmg](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/BAMCLauncher.dmg)
            
            ### Linux
            - [BAMCLauncher.deb](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/BAMCLauncher.deb)
            - [BAMCLauncher.rpm](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/BAMCLauncher.rpm)
            - [BAMCLauncher.AppImage](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/BAMCLauncher.AppImage)
            
            ## 安装说明
            
            详细安装说明请参考[用户手册](https://github.com/${{ github.repository }}/blob/main/docs/USER_MANUAL.md)
            
            ## 反馈与支持
            
            - [GitHub Issues](https://github.com/${{ github.repository }}/issues)
            - [Discord社区](https://discord.gg/your-discord-invite)
            - [邮件支持](mailto:support@bamclauncher.com)
          files: |
            dist/windows/*.msi
            dist/windows/*.zip
            dist/macos/*.dmg
            dist/linux/*.deb
            dist/linux/*.rpm
            dist/linux/*.AppImage
          draft: false
          prerelease: false

  # 部署到GitHub Pages（Web版本）
  deploy-web:
    name: Deploy Web Version
    runs-on: ubuntu-latest
    needs: build-test
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Build web version
        run: flutter build web --release

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
          publish_branch: gh-pages
          cname: bamclauncher.com
