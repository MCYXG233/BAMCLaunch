name: Build and Package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: 'stable'
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Build Windows release
        run: flutter build windows --release
        
      - name: Install WiX Toolset
        run: |
          choco install wixtoolset -y
          echo "C:\Program Files (x86)\WiX Toolset v3.11\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      
      - name: Activate flutter_distributor
        run: dart pub global activate flutter_distributor
      
      - name: Package Windows MSI
        env:
          WINDOWS_CERTIFICATE_FILE: ${{ secrets.WINDOWS_CERTIFICATE_FILE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          $env:PATH += ";C:\Users\runneradmin\AppData\Local\Pub\Cache\bin"
          flutter_distributor package --platform windows --targets msi
      
      - name: Package Windows ZIP
        run: |
          $env:PATH += ";C:\Users\runneradmin\AppData\Local\Pub\Cache\bin"
          flutter_distributor package --platform windows --targets zip
      
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-builds
          path: dist/windows/

  build-macos:
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: 'stable'
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Build macOS release
        run: flutter build macos --release
        
      - name: Activate flutter_distributor
        run: dart pub global activate flutter_distributor
      
      - name: Package macOS DMG
        env:
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          export PATH="$HOME/.pub-cache/bin:$PATH"
          flutter_distributor package --platform macos --targets dmg
      
      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-builds
          path: dist/macos/

  build-linux:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: 'stable'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            ninja-build \
            pkg-config \
            libgtk-3-dev \
            liblzma-dev \
            dpkg-dev \
            rpm \
            libarchive-tools
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Build Linux release
        run: flutter build linux --release
        
      - name: Activate flutter_distributor
        run: dart pub global activate flutter_distributor
      
      - name: Install AppImageKit
        run: |
          wget https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          sudo mv appimagetool-x86_64.AppImage /usr/local/bin/appimagetool
      
      - name: Package Linux deb
        run: |
          export PATH="$HOME/.pub-cache/bin:$PATH"
          flutter_distributor package --platform linux --targets deb
      
      - name: Package Linux rpm
        run: |
          export PATH="$HOME/.pub-cache/bin:$PATH"
          flutter_distributor package --platform linux --targets rpm
      
      - name: Package Linux AppImage
        run: |
          export PATH="$HOME/.pub-cache/bin:$PATH"
          flutter_distributor package --platform linux --targets appimage
      
      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          path: dist/linux/

  create-release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-builds
          path: ./dist/windows
      
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-builds
          path: ./dist/macos
      
      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-builds
          path: ./dist/linux
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/windows/*.msi
            dist/windows/*.zip
            dist/macos/*.dmg
            dist/linux/*.deb
            dist/linux/*.rpm
            dist/linux/*.AppImage
          draft: false
          prerelease: false
